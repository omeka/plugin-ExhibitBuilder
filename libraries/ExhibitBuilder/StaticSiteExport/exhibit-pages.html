{{ define "main" }}
<h1>{{ .Title }}</h1>
<div id="primary">
    {{ with .Params.description }}
    <div class="exhibit-description">{{ . | safeHTML }}</div>
    {{ end }}
    {{ with .Params.credits }}
    <h2>Credits</h2>
    <div class="exhibit-credits">{{ . }}</div>
    {{ end }}
</div>
{{ partial "menu.html" (dict "menuID" (printf "exhibit_%s" (string .Params.exhibitID)) "page" . "id" "exhibit-nav") }}
{{ .Content }}
{{ end }}
